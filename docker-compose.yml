services:
  postgres:
    image: postgres:16-alpine
    container_name: voiddecksafety-pg
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: voiddecksafety
      POSTGRES_PASSWORD: voiddecksafety
      POSTGRES_DB: voiddecksafety
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voiddecksafety"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
