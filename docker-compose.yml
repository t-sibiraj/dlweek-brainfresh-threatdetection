services:
  postgres:
    image: postgres:16-alpine
    container_name: voiddecksafety-pg
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: voiddecksafety
      POSTGRES_PASSWORD: voiddecksafety
      POSTGRES_DB: voiddecksafety
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voiddecksafety"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voiddecksafety-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://voiddecksafety:voiddecksafety@postgres:5432/voiddecksafety
      PORT: 4000
      NODE_ENV: production
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-voiddecksafety-change-me-in-prod}
      MODEL_NAME: ${MODEL_NAME:-gpt-4.1-mini}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_AI_KEY: ${GOOGLE_AI_KEY:-}
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
    volumes:
      - app_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: voiddecksafety-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
  app_data:
